services:
  postgres:
    image: postgres:15.3-alpine
    container_name: agenthub_runtime_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenthub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agenthub_p0_test}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agenthub_runtime_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenthub} -d ${POSTGRES_DB:-agenthub_p0_test}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - agenthub_runtime

  redis:
    image: redis:7.2-alpine
    container_name: agenthub_runtime_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - agenthub_runtime_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - agenthub_runtime

  worker:
    image: node:20-alpine
    container_name: agenthub_runtime_worker
    restart: unless-stopped
    working_dir: /app
    command: ["npx", "tsx", "apps/web/server/runtime-worker.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://agenthub:agenthub_dev@postgres:5432/agenthub_p0_test}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - ../:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agenthub_runtime

networks:
  agenthub_runtime:
    driver: bridge

volumes:
  agenthub_runtime_pgdata:
  agenthub_runtime_redisdata:
