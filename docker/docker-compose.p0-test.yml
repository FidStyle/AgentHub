services:
  postgres:
    image: postgres:15.3-alpine
    container_name: agenthub_p0_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenthub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agenthub_p0_test}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agenthub_p0_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenthub} -d ${POSTGRES_DB:-agenthub_p0_test}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - agenthub_p0_db

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agenthub_p0_pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@agenthub.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - agenthub_p0_pgadmin:/var/lib/pgadmin
    networks:
      - agenthub_p0_db
    depends_on:
      postgres:
        condition: service_healthy

networks:
  agenthub_p0_db:
    driver: bridge

volumes:
  agenthub_p0_pgdata:
  agenthub_p0_pgadmin:
