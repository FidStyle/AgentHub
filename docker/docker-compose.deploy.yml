services:
  postgres:
    image: postgres:15.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenthub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agenthub}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - agenthub_deploy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenthub} -d ${POSTGRES_DB:-agenthub}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - agenthub_deploy

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - agenthub_deploy_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - agenthub_deploy

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      AUTH_URL: ${AUTH_URL:-http://localhost:8080}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:8080}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?NEXT_SERVER_ACTIONS_ENCRYPTION_KEY is required}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://agenthub:agenthub_dev@postgres:5432/agenthub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RUNTIME_EXECUTOR: ${RUNTIME_EXECUTOR:-real}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agenthub_deploy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    command: ["pnpm", "--filter", "@agenthub/web", "exec", "tsx", "server/runtime-worker.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://agenthub:agenthub_dev@postgres:5432/agenthub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?NEXT_SERVER_ACTIONS_ENCRYPTION_KEY is required}
      RUNTIME_EXECUTOR: ${RUNTIME_EXECUTOR:-real}
      RUNTIME_CLI: ${RUNTIME_CLI:-claude_code}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agenthub_deploy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
    volumes:
      - ./Caddyfile.deploy:/etc/caddy/Caddyfile:ro
      - ../deploy/self-hosted:/srv/agenthub:ro
    depends_on:
      - app
    networks:
      - agenthub_deploy

networks:
  agenthub_deploy:
    driver: bridge

volumes:
  agenthub_deploy_pgdata:
  agenthub_deploy_redisdata:
